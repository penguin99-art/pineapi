# Pinea / Piny 装配配置 (PILOT_HOME=deploy/pilot-home)。
# 模型层指向局域网 LocalAI(OpenAI 兼容)。第 0 步 spike 期间关闭 router，用单模型保证确定性。
schemaVersion: 1
agent:
  model: localai/ollama-qwen3-32b
model:
  providers:
    localai:
      protocol: openai
      url: http://192.168.11.155:8080/v1
      apiKey: sk-localai
      models:
        ollama-qwen3-coder-30b:
          displayName: Qwen3 Coder 30B (LocalAI)
          capabilities:
            supportsToolUse: true
            supportsStreaming: true
            contextWindow: 32768
            maxOutputTokens: 8192
        ollama-qwen3-32b:
          displayName: Qwen3 32B (LocalAI)
          capabilities:
            supportsToolUse: true
            supportsStreaming: true
            contextWindow: 32768
            maxOutputTokens: 8192
        qwen35-mtp:
          displayName: Qwen3.5 MTP (LocalAI)
          capabilities:
            supportsToolUse: true
            supportsStreaming: true
            contextWindow: 32768
            maxOutputTokens: 8192
adapters:
  feishu:
    enabled: false
    appId: ""
    appSecret: ""
  # inbound 接缝(MVP)：OpenAI 兼容 HTTP，POST /v1/chat/completions -> gateway.submitTurn
  apiServer:
    enabled: true
    apiKey: ""
    extra:
      port: 8642
router:
  enabled: false
cron:
  enabled: true
  timezone: Asia/Shanghai
  maxConcurrentRuns: 2
